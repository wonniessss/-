<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추첨기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">🎱</div>
      <h1>로또 번호 추첨기</h1>
      <p class="subtitle">생년월일 기반 오늘의 운세로 행운의 번호를 추천해 드립니다</p>
    </header>

    <section class="controls">
      <div class="birthdate-group">
        <label for="birthdate">생년월일</label>
        <input type="date" id="birthdate" class="birthdate-input" min="1900-01-01" required>
        <p class="birthdate-error" id="birthdateError" hidden>올바른 생년월일을 입력해 주세요.</p>
      </div>
      <div class="control-group">
        <label for="setCount">생성 개수</label>
        <div class="stepper">
          <button type="button" id="decreaseBtn" aria-label="개수 줄이기">−</button>
          <span id="setCount">1</span>
          <button type="button" id="increaseBtn" aria-label="개수 늘리기">+</button>
        </div>
      </div>
      <button type="button" id="drawBtn" class="draw-btn" aria-label="운세 기반 번호 추천">
        <span class="draw-btn-text">운세 기반 번호 추천</span>
      </button>
    </section>

    <section class="chat-section" aria-label="운세 챗봇">
      <div class="chat-header">
        <h2>운세 챗봇</h2>
        <p class="chat-desc">오늘의 운세에 대해 자유롭게 물어보세요</p>
      </div>
      <div class="chat-messages" id="chatMessages" aria-live="polite">
        <div class="chat-message chat-message--bot">
          <p>안녕하세요! 생년월일을 입력한 뒤 <strong>운세 기반 번호 추천</strong> 버튼을 누르거나, 궁금한 점을 메시지로 보내 주세요.</p>
        </div>
      </div>
      <form class="chat-form" id="chatForm">
        <input type="text" id="chatInput" class="chat-input" placeholder="예: 오늘 연애운은 어때?" maxlength="500" autocomplete="off">
        <button type="submit" class="chat-send-btn" id="chatSendBtn">전송</button>
      </form>
    </section>

    <section class="results" id="results" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon" aria-hidden="true">✨</div>
        <p>생년월일을 입력하고 운세 기반 번호를 추천받아 보세요!</p>
      </div>
    </section>

    <section class="history-section">
      <div class="history-header">
        <h2>역대 1등 당첨번호</h2>
        <input type="search" id="historySearch" class="history-search" placeholder="회차 검색 (예: 1227)" inputmode="numeric">
      </div>
      <p class="history-status" id="historyStatus">당첨 기록을 불러오는 중...</p>
      <div class="history-list" id="historyList"></div>
      <button type="button" id="loadMoreBtn" class="load-more-btn" hidden>더 보기</button>
    </section>

    <footer class="footer">
      <p>※ 본 추첨기는 오락용이며, 당첨을 보장하지 않습니다.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
